name: Build IPA (TrollStore)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  build-ipa:
    name: Build unsigned IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app (Release, iphoneos)
        run: |
          xcodebuild \
            -project MeshMessengerApp.xcodeproj \
            -scheme MeshMessengerApp \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            clean build

      - name: Package IPA
        run: |
          APP_PATH=$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app found"
            exit 1
          fi
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          /usr/bin/zip -r MeshMessenger-TrollStore-unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v7
        with:
          name: MeshMessenger-TrollStore-unsigned-${{ github.sha }}
          path: MeshMessenger-TrollStore-unsigned.ipa
          if-no-files-found: error
          retention-days: 30

      - name: Build Web Bridge binaries
        run: |
          mkdir -p web-artifacts
          cd web-go
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "-s -w" -o ../web-artifacts/MeshMessenger-WebBridge-linux-amd64 .
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -trimpath -ldflags "-s -w" -o ../web-artifacts/MeshMessenger-WebBridge-windows-amd64.exe .
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags "-s -w" -o ../web-artifacts/MeshMessenger-WebBridge-darwin-arm64 .

      - name: Upload Web Bridge binaries
        uses: actions/upload-artifact@v7
        with:
          name: MeshMessenger-WebBridge-${{ github.sha }}
          path: web-artifacts/*
          if-no-files-found: error
          retention-days: 30

      - name: Attach IPA to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Ensure release exists (create if not)
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --title "$TAG" --notes "Release $TAG"
          gh release upload "$TAG" \
            MeshMessenger-TrollStore-unsigned.ipa \
            web-artifacts/MeshMessenger-WebBridge-linux-amd64 \
            web-artifacts/MeshMessenger-WebBridge-darwin-arm64 \
            web-artifacts/MeshMessenger-WebBridge-windows-amd64.exe \
            --clobber

