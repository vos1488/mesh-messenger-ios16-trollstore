name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test:
    name: Build and Test (SwiftPM)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build
        run: swift build -v

      - name: Test
        run: swift test -v

