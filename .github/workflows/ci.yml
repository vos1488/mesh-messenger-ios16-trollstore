name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Build and Test (SwiftPM)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Swift version
        run: swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build (debug)
        run: swift build -v -c debug

      - name: Test
        run: swift test -v

      - name: Build (release)
        run: swift build -c release

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          cp -r .build/release/MeshMessenger.swiftmodule artifacts/ 2>/dev/null || true
          cp .build/release/*.a artifacts/ 2>/dev/null || true
          find .build/release -maxdepth 1 -type f | sort > artifacts/manifest.txt
          echo "=== Build products ===" && cat artifacts/manifest.txt

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeshMessenger-release-${{ github.sha }}
          path: artifacts/
          if-no-files-found: warn
          retention-days: 30

